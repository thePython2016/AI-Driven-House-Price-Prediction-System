apiVersion: apps/v1
kind: Deployment
metadata:
  name: house-prediction-modeltext
spec:
  replicas: 2
  selector:
    matchLabels:
      app: house-prediction-modeltext
  template:
    metadata:
      labels:
        app: house-prediction-modeltext
    spec:
      containers:
      - name: house-prediction
        image: house-prediction-modeltext
        ports:
        - containerPort: 8501
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"